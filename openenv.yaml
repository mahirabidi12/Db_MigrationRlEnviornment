spec_version: 1
name: db-migration-env
version: "1.0.0"
type: space
runtime: fastapi
description: >
  RL environment for production-scale database migration.
  Agents execute SQL to transform legacy schemas (10-20 tables) into normalized
  production-grade schemas (15-25 tables). Acquisition theme with zero initial overlap.
  30-minute timeout per task. Checklist-based grader with 543-1132 binary checks.
app: db_migration_env.server.app:app
port: 8000

action: MigrationAction
observation: MigrationObservation
state: MigrationState

tasks:
  - id: easy_blog_acquisition
    difficulty: easy
    timeout: 1800
    description: "Acme Corp blog → GlobalTech: 10 acme_* tables → 15 standard tables. Fix FKs, split users, add computed tables."
  - id: medium_lms_acquisition
    difficulty: medium
    timeout: 1800
    description: "Legacy LMS → EduCloud: 15 legacy_* tables → 21 standard tables. Normalize, split addresses, compute stats."
  - id: hard_shoplocal_acquisition
    difficulty: hard
    timeout: 1800
    description: "ShopLocal → NexGenMart: 35 sl_* tables → 55 standard tables. Full overhaul with FK normalization and analytics."
  - id: hard_shoplocal_narrative
    difficulty: hard
    timeout: 1800
    description: "Same as hard_shoplocal but target schema hidden — described via 30K-char narrative."
  - id: hard_shoplocal_formulas
    difficulty: hard
    timeout: 1800
    description: "Same as hard_shoplocal_narrative with explicit computation formulas for aggregation tables."
  - id: hard_hospital_acquisition
    difficulty: hard
    timeout: 1800
    description: "HealthFirst Clinic → MedCore: 31 hc_* tables → 41 enterprise tables. Split monolithic reports into 6 specialized types."
