spec_version: 1
name: db-migration-env
version: "1.0.0"
type: space
runtime: fastapi
description: >
  RL environment for database schema & data migration.
  Agents execute SQL statements to transform a source database into a target schema
  with correct data — simulating real-world database migration workflows.
  Features 3 tasks (easy/medium/hard) with deduplication, computed columns,
  FK management, and cross-table joins.
app: db_migration_env.server.app:app
port: 8000

action: MigrationAction
observation: MigrationObservation
state: MigrationState

tasks:
  - id: easy_restructure_employees
    difficulty: easy
    description: Restructure employees table, extract departments, add computed hire_year and audit log
  - id: medium_school_normalize
    difficulty: medium
    description: Normalize 2 tables into 5 with computed GPA, junction tables, and aggregated stats
  - id: hard_saas_overhaul
    difficulty: hard
    description: Decompose 3 legacy SaaS tables into 7 normalized tables with computed totals and cross-table dedup
