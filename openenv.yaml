spec_version: 1
name: db-migration-env
version: "1.0.0"
type: space
runtime: fastapi
description: >
  RL environment for production-scale database migration.
  Agents execute SQL to transform legacy schemas (4-8 tables) into normalized
  enterprise schemas (8-11 tables). Narrative mode — target schema hidden, described
  in natural language. Checklist-based grader with 194-249 binary checks.
app: db_migration_env.server.app:app
port: 8000

action: MigrationAction
observation: MigrationObservation
state: MigrationState

tags:
  - openenv
  - database
  - sql
  - migration
  - rl-environment

tasks:
  - id: easy_hospital_migration
    difficulty: easy
    max_steps: 8
    description: "HealthFirst Clinic → MedCore: 4→8 tables, 194 checks. Report splitting into 3 types, computed patient_stats."
  - id: medium_instagram_migration
    difficulty: medium
    max_steps: 8
    description: "Facebook → Instagram: 6→10 tables, 217 checks. Polymorphic likes, self-ref comments, computed stats."
  - id: hard_shoplocal_formulas
    difficulty: hard
    max_steps: 8
    description: "ShopLocal → NexGenMart: 8→11 tables, 249 checks. Self-ref categories, 3-way FK, computed aggregates."
