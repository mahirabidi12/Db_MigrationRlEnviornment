spec_version: 1
name: db-migration-env
version: "1.0.0"
type: space
runtime: fastapi
description: >
  RL environment for production-scale database migration.
  Agents execute SQL to transform legacy schemas (15-35 tables) into normalized
  enterprise schemas (20-55 tables). Narrative mode — target schema hidden, described
  in natural language. Checklist-based grader with 1000-2000+ binary checks.
app: db_migration_env.server.app:app
port: 8000

action: MigrationAction
observation: MigrationObservation
state: MigrationState

tasks:
  - id: hard_hospital_narrative
    difficulty: hard
    timeout: 360
    description: "HealthFirst Clinic → MedCore: 31 hc_* tables → 41 enterprise tables. Narrative mode — target schema hidden, described in 35K-char spec."
  - id: medium_instagram_migration
    difficulty: medium
    timeout: 360
    description: "Facebook → Instagram-style unified schema. Narrative mode — target schema hidden."
  - id: hard_shoplocal_formulas
    difficulty: hard
    timeout: 360
    description: "ShopLocal → NexGenMart: 35 sl_* tables → 55 standard tables. Narrative mode with explicit computation formulas."
