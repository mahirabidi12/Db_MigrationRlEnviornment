name: Keep HF Space Alive

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://techsas-db-migration-env.hf.space/health)
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Space is down! Sending wake-up ping..."
            curl -s -X POST https://techsas-db-migration-env.hf.space/reset -H "Content-Type: application/json" -d '{"session_id":"keepalive"}' -o /dev/null
            sleep 30
            curl -s https://techsas-db-migration-env.hf.space/health
          fi
